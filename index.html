<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <!-- 
    ========================================================================
    預設城市切換 (Default City Switcher)
    若要更改預設首頁的城市，請將下方的 'okinawa.html' 替換為其他城市名稱：
    - 沖繩: okinawa.html
    - 東京: tokyo.html
    - 大阪: osaka.html
    - 名古屋: nagoya.html
    ========================================================================
  -->
  <meta http-equiv="refresh" content="0; url=okinawa.html">
  <title>重新導向中... Redirecting...</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; }
    .container { text-align: center; }
    .loader { border: 4px solid var(--border); border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .city-switcher { margin-top: 20px; padding: 10px; border-radius: 8px; font-size: 1rem; border: 1px solid var(--border); background-color: var(--card-bg); color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader"></div>
    <h2>即將帶您前往專屬旅程...</h2>
    <p>如果您沒有自動跳轉，請手動選擇下方城市：</p>
    <select class="city-switcher" onchange="if(this.value) window.location.href=this.value" aria-label="切換城市">
      <option value="">選擇其他城市...</option>
      <option value="okinawa.html">🌺 沖繩</option>
      <option value="tokyo.html">🗼 東京</option>
      <option value="osaka.html">🐙 大阪</option>
      <option value="nagoya.html">🏯 名古屋</option>
    </select>
  </div>
  <script>
    (function(){
      const t = localStorage.getItem("theme");
      if(t) document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
</body>
</html>
